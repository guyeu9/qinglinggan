<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI 设置 - 轻盈灵感</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6EE7B7",
                        "primary-dark": "#065F46",
                        "background-light": "#F0FDF4",
                        "background-dark": "#122017",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        .custom-select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23065F46' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-primary-dark dark:text-slate-100 min-h-screen">
<!-- Top Navigation Bar -->
<header class="sticky top-0 z-10 bg-white">
<div class="flex items-center p-4">
<button class="flex items-center justify-center size-10 rounded-full hover:bg-primary/10 transition-colors">
<span class="material-symbols-outlined text-primary-dark">arrow_back</span>
</button>
<h1 class="ml-4 text-xl font-bold tracking-tight">AI 设置</h1>
</div>
</header>
<main class="p-4 pb-32 space-y-8">
<!-- Section 1: Analysis API Settings -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<h2 class="text-lg font-semibold flex items-center gap-2">
<span class="material-symbols-outlined text-primary">analytics</span>
                    分析 API 设置
                </h2>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
<span class="ms-3 text-sm font-medium">启用分析</span>
</label>
</div>
<div class="grid gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">API 接口地址</label>
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all placeholder:text-gray-400" placeholder="https://api.openai.com/v1" type="text" value="https://api.openai.com/v1"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">API 密钥</label>
<div class="relative">
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all" placeholder="sk-••••••••••••••••" type="password" value="sk-proj-......................."/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 cursor-pointer hover:text-primary-dark">visibility</span>
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">模型选择</label>
<select class="custom-select w-full px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all appearance-none">
<option value="gpt-4o">GPT-4o (默认)</option>
<option value="claude-3-5">Claude 3.5 Sonnet</option>
<option value="gpt-4-turbo">GPT-4 Turbo</option>
<option value="mistral-large">Mistral Large</option>
</select>
</div>
</div>
</section>
<hr class="border-primary/10"/>
<!-- Section 2: Vector API Settings -->
<section class="space-y-6">
<div class="flex items-center justify-between">
<h2 class="text-lg font-semibold flex items-center gap-2">
<span class="material-symbols-outlined text-primary">account_tree</span>
                    向量 API 设置
                </h2>
<button class="text-xs font-bold uppercase tracking-wider px-3 py-1.5 rounded-full border border-primary text-primary-dark hover:bg-primary/10 transition-colors">
                    测试连接
                </button>
</div>
<div class="grid gap-4">
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">嵌入接口地址</label>
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all placeholder:text-gray-400" placeholder="https://api.pinecone.io" type="text"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">向量 API 密钥</label>
<input class="w-full px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all" placeholder="pcsk_••••••••••••••••" type="password"/>
</div>
<div class="flex flex-col gap-1.5">
<label class="text-sm font-medium opacity-80">向量维度</label>
<div class="flex items-center gap-3">
<input class="flex-1 px-4 py-3 rounded-xl border border-primary/20 bg-white focus:border-primary focus:ring-0 transition-all" type="number" value="1536"/>
<span class="text-sm opacity-60">Ada-002 标准</span>
</div>
</div>
</div>
</section>
<!-- Illustration / Visual Accent -->
<div class="mt-8 p-6 rounded-2xl bg-primary/10 flex items-center gap-6">
<div class="size-16 rounded-2xl bg-primary/20 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-dark text-3xl">auto_awesome</span>
</div>
<div>
<h4 class="font-bold text-primary-dark">神经引擎已激活</h4>
<p class="text-sm opacity-70">配置更改在保存后将立即影响全局灵感算法。</p>
</div>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light p-4">
<div class="w-full">
<button class="w-full bg-primary hover:bg-primary/90 text-primary-dark font-bold py-4 rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98] flex items-center justify-center gap-2">
<span class="material-symbols-outlined">save</span>
                保存配置
            </button>
</div>
</div>
</body></html>
