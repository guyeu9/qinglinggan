<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6EE7B7",
                        "primary-dark": "#065F46",
                        "background-light": "#F0FDF4",
                        "background-dark": "#022c22",
                        "accent": "#BAE6FD",
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "2xl": "1rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        body { font-family: 'Public Sans', sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
    .animate-fade-in-up {
        animation: fadeInUp 0.5s ease-out forwards;
    }
    .card-hover {
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .card-hover:active {
        transform: translateY(-2px);
    }
    .btn-pulse:active {
        transform: scale(0.95);
    }
    .tab-transition {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
</style></head>
<body class="bg-background-light dark:bg-background-dark text-primary-dark dark:text-emerald-50 font-display transition-colors duration-300">
<!-- Top Navigation Bar -->
<nav class="sticky top-0 z-50 grid grid-cols-3 items-center px-4 py-2 bg-white">
<div class="flex items-center justify-start">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors group">
<span class="material-symbols-outlined text-2xl" style="color: #065F46;">menu</span>
</button>
</div>
<div class="flex items-center justify-center">
<h1 class="text-xl font-medium tracking-tight text-primary-dark dark:text-emerald-50">轻灵感</h1>
</div>
<div class="flex items-center justify-end gap-1">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-2xl" style="color: #065F46;">auto_awesome</span>
</button>
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-900 dark:text-white">
<span class="material-symbols-outlined text-2xl" style="color: #065F46;">add</span>
</button>
</div>
</nav>
<!-- Search Bar Section -->
<div class="px-4 py-3 bg-background-light">
<div class="relative flex items-center w-full">
<span class="material-symbols-outlined absolute left-3 text-slate-400">search</span>
<input class="w-full h-11 pl-10 pr-4 bg-white rounded-xl focus:ring-2 focus:ring-primary/50 text-sm placeholder:text-slate-400 text-primary-dark dark:text-emerald-50 transition-all border-0" placeholder="搜索灵感" type="text"/>
</div>
</div>
<!-- Tabs Section -->
<div class="bg-background-light">
<div class="flex px-2 overflow-x-auto hide-scrollbar">
<button class="flex-none px-3 py-3 text-xs font-bold border-b-2 border-primary text-primary-dark dark:text-primary tab-transition">时间轴</button>
<button class="flex-none px-3 py-3 text-xs font-medium text-gray-500 dark:text-emerald-400 border-b-2 border-transparent tab-transition">社交/旅行/惊喜</button>
<button class="flex-none px-3 py-3 text-xs font-medium text-gray-500 dark:text-emerald-400 border-b-2 border-transparent tab-transition">工作/创意</button>
<button class="flex-none px-3 py-3 text-xs font-medium text-gray-500 dark:text-emerald-400 border-b-2 border-transparent tab-transition">摄影爱好</button>
</div>
</div>
<!-- Content List -->
<main class="p-4 space-y-4 pb-40 bg-background-light">
<!-- Inspiration Card 1 -->
<div class="bg-white dark:bg-emerald-950 rounded-xl p-4 shadow-sm animate-fade-in-up card-hover">
<div class="flex justify-between items-start mb-2">
<span class="px-2 py-0.5 bg-primary/20 text-primary-dark dark:text-primary text-[10px] font-bold rounded uppercase tracking-wider btn-pulse cursor-pointer transition-transform">工作/创意</span>
<span class="text-[10px] text-slate-400 font-medium">10:30 AM</span>
</div>
<p class="text-sm leading-relaxed text-primary-dark/90 dark:text-emerald-100">尝试用极简主义风格重新设计个人主页，强调留白。考虑使用对比鲜明的排版来引导用户的视线流动。</p>
<div class="mt-4 w-full aspect-video rounded-lg bg-cover bg-center bg-slate-200" data-alt="Minimalist desk setup with laptop and notebook" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDlpokfYeDSEFJCUaEzGpWSMtkw1l6NXUKjO_nf833Vb5YPC41vKkUzU7AU4mLmpf0MKS5aT-CHCwYGlT0ZbiFpyfiWN3ObS-XNsnLM0tHCTSKGItvH5Bvs9xlcv4uo_I8X7E5CFMYUZTAqjZCa6TjkEogyojLkCAllBDBR_b8VipHdq_tRHSaexe67Wryzk0vW3TuZnWAtkTXn3WEmcebEZOCBffFuOdLMkRL6B8v1yEpcGYXrWoD92xrRZx3a3hxrC26ki46QVnA')"></div>
</div>
<!-- Inspiration Card 2 -->
<div class="bg-white dark:bg-emerald-950 rounded-xl p-4 shadow-sm animate-fade-in-up card-hover">
<div class="flex justify-between items-start mb-2">
<span class="px-2 py-0.5 bg-primary/20 text-primary-dark dark:text-primary text-[10px] font-bold rounded uppercase tracking-wider btn-pulse cursor-pointer transition-transform">社交/旅行</span>
<span class="text-[10px] text-slate-400 font-medium">昨天 18:45</span>
</div>
<p class="text-sm leading-relaxed text-primary-dark/90 dark:text-emerald-100">在京都的小巷里发现了一家只卖抹茶的手工店，门帘的颜色非常高级，也许可以作为下一套UI设计的配色方案。</p>
</div>
<!-- Inspiration Card 3 -->
<div class="bg-white dark:bg-emerald-950 rounded-xl p-4 shadow-sm animate-fade-in-up card-hover">
<div class="flex justify-between items-start mb-2">
<span class="px-2 py-0.5 bg-primary/20 text-primary-dark dark:text-primary text-[10px] font-bold rounded uppercase tracking-wider btn-pulse cursor-pointer transition-transform">摄影爱好</span>
<span class="text-[10px] text-slate-400 font-medium">昨天 14:20</span>
</div>
<div class="grid grid-cols-2 gap-2 mb-3">
<div class="aspect-square rounded-lg bg-cover bg-center bg-slate-200" data-alt="Close up of a vintage camera lens" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBHi45i94st-uH3NYekS5KDPxd9hJ7_EuMya9YsZ490ji2lknM1kzDkVCQxvopzQLpAdLzgtvGh6NVdFOplEzMBJrpSMh0T8QqOlesYmCnBOcHOmPfkYfQDsLVVrLaTZNV1Ytki2dJS4Btf-SZ1SXVgiz1IbbW7ceGzzqa7DfhGHtEcoEABuRUeeVrXrbfCy6BdbvAkcXkyUMc-H8H1Sbh5SE4BSNmAUb9D123QSbgrX7Ko-NnETcqYTQqw5LlOWek1Rz_Hw2cg6Iw')"></div>
<div class="aspect-square rounded-lg bg-cover bg-center bg-slate-200" data-alt="Golden hour photography in a park" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAnv46mMLByqthSjJndu3eNxnpYi7aXte1TDVUEsCB3LiMTBYx2fYnRVs9gwWwHjDYRAvknnNjRE-shL7j4ZXiPcgeaNZcEqde9_ye4cgqEq1vxkDFuEVGOLbijfYRp4wDWQsUjk8tva-JSKfd7ShsuLkHOmZQyXCq8T5bFz2oYm8p1waqGP45d2eg26HdShdhzee9mqAkgNkNcZDeHKs3qMXfK8XGbvNhxq3c2hHY8qgyGbkPvBR95Yy7yR5SZn5HDhr1bCsSwhSU')"></div>
</div>
<p class="text-sm leading-relaxed text-primary-dark/90 dark:text-emerald-100">黄金时段的光影质感永远迷人，下次尝试用长焦镜头捕捉街道上的光斑阴影。</p>
</div>
</main>
<!-- Persistent Bottom Input & Nav -->
<div class="fixed bottom-0 left-0 right-0 bg-background-light px-4 pt-3 pb-8">
<!-- Floating Expandable Input Area -->
<div class="flex items-center gap-3 bg-white rounded-2xl p-2 mb-3 shadow-sm">
<textarea class="flex-1 px-3 py-2 bg-transparent border-none focus:ring-0 resize-none text-sm placeholder:text-slate-400 text-primary-dark dark:text-emerald-50 min-h-[44px]" placeholder="记录下当下的灵感..." rows="1"></textarea>
<button class="flex items-center justify-center w-10 h-10 bg-primary text-primary-dark rounded-full shadow-lg shadow-primary/20 active:scale-95 transition-all btn-pulse">
<span class="material-symbols-outlined text-xl">send</span>
</button>
</div>
<!-- Quick Actions -->
<div class="flex items-center gap-6 px-2">
<button class="text-emerald-800/40 hover:text-primary transition-colors btn-pulse">
<span class="material-symbols-outlined">image</span>
</button>
<button class="text-emerald-800/40 hover:text-primary transition-colors btn-pulse">
<span class="material-symbols-outlined">mic</span>
</button>
</div>
</div>
</body></html>
