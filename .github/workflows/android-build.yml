name: Android Build

on:
  push:
    branches:
      - main
      - master
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

env:
  FLUTTER_VERSION: '3.41.2'
  WORKING_DIRECTORY: ./light_idea

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    continue-on-error: true
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generator (Isar)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Tests with JSON Output
        run: |
          flutter test --machine > test-results.json
          flutter test --coverage
        continue-on-error: true

      - name: Convert Test Results to JUnit XML
        run: |
          dart pub global activate junitreport
          dart pub global run junitreport:tojunit --input test-results.json --output test-results.xml
        continue-on-error: true

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Flutter Test Results
          path: 'light_idea/test-results.xml'
          reporter: java-junit
          fail-on-error: false

      - name: Generate Test Summary
        if: always()
        run: |
          echo "## 📊 测试结果摘要" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f test-results.xml ]; then
            TOTAL=$(grep -o '<testsuite.*tests="[0-9]*"' test-results.xml | grep -o 'tests="[0-9]*"' | grep -o '[0-9]*' | head -1)
            FAILURES=$(grep -o '<testsuite.*failures="[0-9]*"' test-results.xml | grep -o 'failures="[0-9]*"' | grep -o '[0-9]*' | head -1)
            ERRORS=$(grep -o '<testsuite.*errors="[0-9]*"' test-results.xml | grep -o 'errors="[0-9]*"' | grep -o '[0-9]*' | head -1)
            SKIPPED=$(grep -o '<testsuite.*skipped="[0-9]*"' test-results.xml | grep -o 'skipped="[0-9]*"' | grep -o '[0-9]*' | head -1)
            
            PASSED=$((TOTAL - FAILURES - ERRORS - SKIPPED))
            
            echo "| 指标 | 数量 |" >> $GITHUB_STEP_SUMMARY
            echo "|------|------|" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ 通过 | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ 失败 | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| ⚠️ 错误 | $ERRORS |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ 跳过 | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
            echo "| **总计** | **$TOTAL** |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            
            if [ "$FAILURES" -gt 0 ] || [ "$ERRORS" -gt 0 ]; then
              echo "### ❌ 失败的测试用例" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -A 5 '<failure' test-results.xml | head -50 >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "⚠️ 测试结果文件未生成" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: light_idea/coverage/
          retention-days: 7

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            light_idea/test-results.json
            light_idea/test-results.xml
          retention-days: 7

  build:
    name: Build Android APK & AAB
    runs-on: ubuntu-latest
    if: always()
    
    outputs:
      version: ${{ steps.version_info.outputs.version }}
    
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true
          cache-key: 'flutter-:os:-:channel:-:version:-:arch:-:hash:'
          cache-path: '${{ runner.tool_cache }}/flutter/:channel:-:version:-:arch:'

      - name: Verify Flutter Installation
        run: |
          flutter --version
          flutter doctor -v

      - name: Get Version Info
        id: version_info
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | sed 's/version: //')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Get Dependencies
        run: flutter pub get

      - name: Run Code Generator (Isar)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Analyze Code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Decode Keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/keystore.jks
            echo "KEYSTORE_CREATED=true" >> $GITHUB_ENV
          else
            echo "No keystore provided, using debug signing"
            echo "KEYSTORE_CREATED=false" >> $GITHUB_ENV
          fi

      - name: Create key.properties
        env:
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ "$KEYSTORE_CREATED" = "true" ]; then
            cat > android/key.properties << EOF
          storePassword=$ANDROID_STORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=keystore.jks
          EOF
          fi

      - name: Build Debug APK
        if: github.event_name == 'pull_request' || github.event.inputs.build_type == 'debug'
        run: |
          flutter build apk --debug
          mv build/app/outputs/flutter-apk/app-debug.apk build/app/outputs/flutter-apk/light-idea-debug.apk

      - name: Build Release APK
        if: github.event_name != 'pull_request' && github.event.inputs.build_type != 'debug'
        run: |
          flutter build apk --release
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/light-idea-release.apk

      - name: Build App Bundle (AAB)
        if: github.event_name != 'pull_request' && github.event.inputs.build_type != 'debug'
        run: |
          flutter build appbundle --release
          mv build/app/outputs/bundle/release/app-release.aab build/app/outputs/bundle/release/light-idea-release.aab

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: light-idea-apk
          path: |
            light_idea/build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Upload App Bundle Artifact
        if: github.event_name != 'pull_request' && github.event.inputs.build_type != 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: light-idea-aab
          path: light_idea/build/app/outputs/bundle/release/*.aab
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: light-idea-apk
          path: ./artifacts/

      - name: Download App Bundle Artifact
        uses: actions/download-artifact@v4
        with:
          name: light-idea-aab
          path: ./artifacts/

      - name: Get Version from Tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Light Idea ${{ steps.get_version.outputs.VERSION }}
          body: |
            ## 轻灵感 ${{ steps.get_version.outputs.VERSION }}
            
            ### 下载
            
            | 文件 | 说明 |
            |------|------|
            | `light-idea-release.apk` | Android 安装包，可直接安装 |
            | `light-idea-release.aab` | Android App Bundle，用于上传 Google Play |
            
            ### AAB 文件说明
            
            **什么是 AAB？**
            
            AAB (Android App Bundle) 是 Google 推出的官方发布格式，相比传统 APK 有以下优势：
            
            1. **体积更小**：Google Play 会根据用户设备自动生成优化的 APK，用户下载的包体更小
            2. **按需下载**：支持动态功能模块，用户只下载需要的资源
            3. **自动优化**：自动针对不同设备生成最优 APK（不同 CPU 架构、屏幕密度等）
            4. **Google Play 必需**：从 2021 年起，Google Play 商店必须使用 AAB 格式上传
            
            **如何使用 AAB？**
            
            - 上传到 Google Play Console
            - 使用 bundletool 在本地测试
            - 转换为多个 APK 进行分发
            
            ### 更新说明
            请查看 [更新记录](./更新记录.md) 获取详细更新内容。
          files: |
            artifacts/*.apk
            artifacts/*.aab
          draft: false
          prerelease: false
